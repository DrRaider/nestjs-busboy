name: Dependabot Changeset

on: pull_request

permissions:
  contents: write

jobs:
  changeset:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: dependabot/fetch-metadata@v2
        id: metadata

      - name: Create changeset for production dependency updates
        if: steps.metadata.outputs.dependency-type == 'direct:production'
        run: |
          cat > ".changeset/dependabot-$(date +%s).md" << 'EOF'
          ---
          "nestjs-busboy": patch
          ---

          Update dependency ${{ steps.metadata.outputs.dependency-names }} to ${{ steps.metadata.outputs.new-version }}
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset
          git commit -m "chore: add changeset for dependency update"
          git push
